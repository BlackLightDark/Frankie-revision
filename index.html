<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frankie's Revision Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --ink: #1a1714;
    --ink-light: #6b6560;
    --accent: #c84b2f;
    --accent-soft: #f2e8e5;
    --highlight: #f5c842;
    --highlight-soft: #fdf8e3;
    --green: #2d7a4f;
    --green-soft: #e5f2eb;
    --blue: #2356a8;
    --blue-soft: #e5ecf7;
    --border: #e2ddd6;
    --done-bg: #f0ede8;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }

  header {
    background: var(--ink);
    color: white;
    padding: 28px 32px 24px;
    display: flex;
    align-items: flex-end;
    gap: 20px;
    flex-wrap: wrap;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.4rem;
    line-height: 1;
    color: white;
  }

  header h1 span {
    color: var(--highlight);
    font-style: italic;
  }

  .header-meta {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .progress-bar-wrap {
    flex: 1;
    min-width: 200px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
  }

  .progress-bar {
    background: rgba(255,255,255,0.15);
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
  }

  .progress-fill {
    background: var(--highlight);
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .tabs {
    display: flex;
    gap: 0;
    padding: 0 32px;
    background: var(--ink);
    border-bottom: 2px solid var(--border);
  }

  .tab {
    padding: 12px 20px;
    font-size: 0.82rem;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
  }

  .tab:hover { color: rgba(255,255,255,0.8); }
  .tab.active { color: var(--highlight); border-bottom-color: var(--highlight); }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px 60px; }

  /* WEEK VIEW */
  .week-block { margin-bottom: 40px; }

  .week-label {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .week-label h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: var(--ink);
  }

  .week-label .divider {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .week-label .week-stat {
    font-size: 0.75rem;
    color: var(--ink-light);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 99px;
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .half-term-grid {
    grid-template-columns: repeat(2, 1fr) !important;
    max-width: 400px;
  }

  .school-week-grid {
    grid-template-columns: repeat(7, 1fr);
  }

  .day-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: box-shadow 0.15s;
    min-height: 120px;
  }

  .day-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

  .day-header {
    padding: 8px 10px 6px;
    border-bottom: 1px solid var(--border);
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .day-date { font-size: 0.9rem; font-weight: 600; color: var(--ink); }

  .day-body { padding: 6px; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 5px;
    padding: 4px 6px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.7rem;
    line-height: 1.28;
    border: 1px solid transparent;
    user-select: none;
    word-break: break-word;
    overflow-wrap: break-word;
    min-width: 0;
  }

  .task-item:hover { opacity: 0.85; }

  .task-item.done {
    opacity: 0.45;
    text-decoration: line-through;
  }

  .task-cb {
    width: 12px;
    height: 12px;
    min-width: 12px;
    border-radius: 3px;
    border: 1.5px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    font-size: 8px;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .task-item.done .task-cb { background: currentColor; }
  .task-item.done .task-cb::after { content: '✓'; color: white; font-weight: bold; }

  /* Subject colour coding */
  .subj-maths    { background: #e8f0fe; color: #1a56db; border-color: #c3d4fa; }
  .subj-english  { background: #fce8f3; color: #9d174d; border-color: #f8b4d9; }
  .subj-lit      { background: #fce8f3; color: #9d174d; border-color: #f8b4d9; }
  .subj-bio      { background: #e5f2eb; color: #1e6b3e; border-color: #a7d7b8; }
  .subj-chem     { background: #e5f0fa; color: #1c4a8a; border-color: #a9c8ef; }
  .subj-physics  { background: #e8f7ff; color: #0e5c8a; border-color: #90d2f0; }
  .subj-history  { background: #fdf0e3; color: #8a4a00; border-color: #f5c88a; }
  .subj-geog     { background: #e5f7f0; color: #1a6b50; border-color: #8ad4b8; }
  .subj-art      { background: #f5e8ff; color: #6a1e9e; border-color: #d4a8f5; }
  .subj-music    { background: #fdf5e8; color: #7a4e00; border-color: #f5d498; }
  .subj-macbeth  { background: #fce8f3; color: #9d174d; border-color: #f8b4d9; }
  .subj-default  { background: #f5f5f5; color: #444; border-color: #ddd; }

  /* Special events */
  .task-item.event-special {
    background: var(--highlight-soft) !important;
    border-color: var(--highlight) !important;
    color: #7a5800 !important;
    font-weight: 600;
  }

  .task-item.event-school {
    background: #e8f0fe !important;
    border-color: #6c8ede !important;
    color: #1a3a8a !important;
    font-weight: 600;
  }

  .empty-day { display: flex; align-items: center; justify-content: center; height: 60px; }
  .empty-day span { font-size: 0.7rem; color: var(--border); letter-spacing: 0.05em; }

  /* EXAM LIST VIEW */
  .exam-lists { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

  @media (max-width: 700px) {
    .exam-lists { grid-template-columns: 1fr; }
    .days-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .exam-list-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .exam-list-header {
    padding: 14px 18px;
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    border-bottom: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .exam-list-header .badge {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    padding: 3px 9px;
    border-radius: 99px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .badge-before { background: var(--accent-soft); color: var(--accent); }
  .badge-after  { background: var(--blue-soft); color: var(--blue); }

  .exam-list-body { padding: 12px 18px; }

  .exam-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .exam-row:last-child { border-bottom: none; }
  .exam-row:hover { opacity: 0.7; }
  .exam-row.done { opacity: 0.4; }
  .exam-row.done .exam-name { text-decoration: line-through; }

  .exam-num {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 50%;
    background: var(--ink);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
  }

  .exam-row.done .exam-num { background: var(--green); }

  .exam-name { font-size: 0.88rem; flex: 1; }

  .exam-tick {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    transition: all 0.15s;
  }

  .exam-row.done .exam-tick {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    color: var(--ink-light);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  /* Tab panels */
  .panel { display: none; }
  .panel.active { display: block; }

  .stats-bar {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .stat-chip {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 18px;
    flex: 1;
    min-width: 120px;
  }

  .stat-chip .val {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    line-height: 1;
    color: var(--ink);
  }

  .stat-chip .lbl {
    font-size: 0.72rem;
    color: var(--ink-light);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 4px;
  }

  .today-marker .day-header {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }

  .today-marker .day-date { color: var(--highlight); }

</style>
</head>

    maths: 'subj-maths', english: 'subj-english', lit: 'subj-lit',
    bio: 'subj-bio', chem: 'subj-chem', physics: 'subj-physics',
    history: 'subj-history', geog: 'subj-geog', art: 'subj-art',
    music: 'subj-music', macbeth: 'subj-macbeth', default: 'subj-default'
  };
  return map[subj] || 'subj-default';
}

function renderTimetable() {
  const container = document.getElementById('weeks-container');
  container.innerHTML = '';

  weeks.forEach((week, wi) => {
    const block = document.createElement('div');
    block.className = 'week-block';

    // Count tasks in this week
    let totalTasks = 0, doneTasks = 0;
    week.days.forEach((d, di) => {
      d.tasks.forEach((t, ti) => {
        totalTasks++;
        if (state.tasks[taskKey(wi, di, ti)]) doneTasks++;
      });
    });

    const gridClass = week.halfTerm ? 'days-grid half-term-grid' : week.schoolWeek ? 'days-grid school-week-grid' : 'days-grid';
    const htBadge = week.halfTerm ? '<span style="font-size:0.75rem;background:#fdf8e3;color:#7a5800;padding:3px 10px;border-radius:99px;border:1px solid #f5c842;font-weight:600;">🏖 Half Term</span>' : week.schoolWeek ? '<span style="font-size:0.75rem;background:#e8f0fe;color:#1a3a8a;padding:3px 10px;border-radius:99px;border:1px solid #6c8ede;font-weight:600;">🏫 School + Evening</span>' : '';
    block.innerHTML = `
      <div class="week-label">
        <h2>${week.label}</h2>
        ${htBadge}
        <div class="divider"></div>
        <div class="week-stat">${doneTasks}/${totalTasks} done</div>
      </div>
      <div class="${gridClass}" id="grid-${wi}"></div>
    `;
    container.appendChild(block);

    const grid = document.getElementById(`grid-${wi}`);

    week.days.forEach((d, di) => {
      const card = document.createElement('div');
      card.className = 'day-card';

      let bodyHTML = '';
      if (d.tasks.length === 0) {
        bodyHTML = `<div class="empty-day"><span>—</span></div>`;
      } else {
        d.tasks.forEach((t, ti) => {
          const key = taskKey(wi, di, ti);
          const done = state.tasks[key] ? 'done' : '';
          const special = t.special === 'special' ? 'event-special' : t.special === 'school' ? 'event-school' : '';
          const sClass = special || subjClass(t.subj);
          bodyHTML += `
            <div class="task-item ${sClass} ${done}" onclick="toggleTask('${key}', this)">
              <div class="task-cb"></div>
              <span>${t.text}</span>
            </div>`;
        });
      }

      card.innerHTML = `
        <div class="day-header">
          <span>${d.day}</span>
          <span class="day-date">${d.date}</span>
        </div>
        <div class="day-body">${bodyHTML}</div>
      `;
      grid.appendChild(card);
    });
  });
}

function renderExams() {

  function makeList(title, badge, badgeClass, items, listKey) {
    const card = document.createElement('div');
    card.className = 'exam-list-card';
    let rows = items.map((name, i) => {
      const key = examKey(listKey, i);
      const done = state.exams[key] ? 'done' : '';
      const tick = done ? '✓' : '';
      return `
        <div class="exam-row ${done}" onclick="toggleExam('${key}', this)">
          <div class="exam-num">${i + 1}</div>
          <span class="exam-name">${name}</span>
          <div class="exam-tick">${tick}</div>
        </div>`;
    }).join('');

    card.innerHTML = `
      <div class="exam-list-header">
        ${title} <span class="badge ${badgeClass}">${badge}</span>
      </div>
      <div class="exam-list-body">${rows}</div>
    `;
    container.appendChild(card);
  }

  makeList('Before Half Term', 'Priority', 'badge-before', examsBefore, 'before');
  makeList('After Half Term', 'Coming up', 'badge-after', examsAfter, 'after');
}

function toggleTask(key, el) {
  state.tasks[key] = !state.tasks[key];
  saveState();
  el.classList.toggle('done', state.tasks[key]);
  updateProgress();
  // update week stat labels
  renderTimetable();
}

function toggleExam(key, el) {
  state.exams[key] = !state.exams[key];
  saveState();
  el.classList.toggle('done', state.exams[key]);
  const tick = el.querySelector('.exam-tick');
  if (tick) tick.textContent = state.exams[key] ? '✓' : '';
  const num = el.querySelector('.exam-num');
  // keep num colour via css
}

function updateProgress() {
  let total = 0, done = 0;
  weeks.forEach((week, wi) => {
    week.days.forEach((d, di) => {
      d.tasks.forEach((t, ti) => {
        total++;
        if (state.tasks[taskKey(wi, di, ti)]) done++;
      });
    });
  });
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} of ${total} tasks done`;
  document.getElementById('progress-pct').textContent = pct + '%';

  // Traffic light: compare actual % done vs expected % done based on today's date
  const startDate = new Date('2025-03-30');
  const endDate   = new Date('2025-05-30');
  const today     = new Date();
  today.setHours(0,0,0,0);

  let expectedPct = 0;
  if (today <= startDate) {
    expectedPct = 0;
  } else if (today >= endDate) {
    expectedPct = 100;
  } else {
    const elapsed = today - startDate;
    const span    = endDate - startDate;
    expectedPct   = Math.round((elapsed / span) * 100);
  }

  const delta = pct - expectedPct; // positive = ahead, negative = behind
  let light, label;
  const endDateCmp = new Date(endDate); endDateCmp.setHours(0,0,0,0);
  const startDateCmp = new Date(startDate); startDateCmp.setHours(0,0,0,0);
  if (today >= endDateCmp) {
    light = pct === 100 ? '🟢' : pct >= 80 ? '🟡' : '🔴';
    label = pct === 100 ? 'Complete!' : 'Exams on — keep going';
  } else if (today < startDateCmp) {
    light = '⚪';
    label = 'Not started yet';
  } else if (delta >= 5) {
    light = '🟢';
    label = 'Ahead of schedule';
  } else if (delta >= -10) {
    light = '🟡';
    label = 'On track';
  } else {
    light = '🔴';
    label = 'Behind schedule';
  }

  document.getElementById('traffic-light').textContent = light;
  document.getElementById('traffic-label').textContent = label;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['timetable','exams','revision','examtable'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  if (name === 'revision') renderSubjectGrid();
  if (name === 'examtable') renderExamTable();
}

let activeSubject = null;
let currentCardIndex = 0;
let cardFlipped = false;

function renderSubjectGrid() {
  const grid = document.getElementById('subject-grid');
  if (grid.innerHTML) return;
  subjects.forEach(s => {
    const card = document.createElement('div');
    card.style.cssText = `cursor:pointer;background:white;border:1.5px solid var(--border);border-radius:10px;padding:18px 14px;display:flex;flex-direction:column;gap:8px;transition:box-shadow 0.15s;`;
    card.innerHTML = `
      <div style="font-size:1.8rem;">${s.emoji}</div>
      <div style="font-weight:600;font-size:0.9rem;">${s.label}</div>
      <div style="font-size:0.72rem;color:var(--ink-light);">${s.cards.length} flashcards</div>
    `;
    card.onmouseenter = () => card.style.boxShadow = '0 4px 16px rgba(0,0,0,0.09)';
    card.onmouseleave = () => card.style.boxShadow = 'none';
    card.onclick = () => openSubject(s);
    grid.appendChild(card);
  });
}

function openSubject(s) {
  activeSubject = s;
  currentCardIndex = 0;
  cardFlipped = false;
  document.getElementById('revision-home').style.display = 'none';
  document.getElementById('revision-detail').style.display = 'block';
  renderFlashcards();
}

function renderFlashcards() {
  const s = activeSubject;
  const inner = document.getElementById('revision-detail-inner');
  inner.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;">
      <span style="font-size:2rem;">${s.emoji}</span>
      <h2 style="font-family:'DM Serif Display',serif;font-size:1.6rem;flex:1;">${s.label} Flashcards</h2>
      <span style="font-size:0.78rem;color:var(--ink-light);background:var(--surface);border:1px solid var(--border);padding:4px 12px;border-radius:99px;" id="card-counter">1 / ${s.cards.length}</span>
    </div>

    <style>
      .flashcard-scene { width:100%;max-width:580px;margin:0 auto 24px;height:220px;perspective:1000px;cursor:pointer; }
      .flashcard-inner { position:relative;width:100%;height:100%;transition:transform 0.5s;transform-style:preserve-3d; }
      .flashcard-scene.flipped .flashcard-inner { transform:rotateY(180deg); }
      .flashcard-face { position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;align-items:center;justify-content:center;padding:28px;text-align:center; }
      .flashcard-front { background:var(--ink);color:white;box-shadow:0 8px 32px rgba(0,0,0,0.18); }
      .flashcard-back { background:var(--green-soft);border:2px solid var(--green);transform:rotateY(180deg); }
      .flashcard-front .label { font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;opacity:0.5;margin-bottom:14px; }
      .flashcard-front .question { font-family:'DM Serif Display',serif;font-size:1.25rem;line-height:1.4; }
      .flashcard-back .answer { font-size:0.9rem;line-height:1.6;color:var(--ink);white-space:pre-line; }
      .fc-hint { font-size:0.72rem;color:var(--ink-light);text-align:center;margin-bottom:20px; }
      .fc-nav { display:flex;align-items:center;justify-content:center;gap:12px; }
      .fc-btn { background:white;border:1.5px solid var(--border);border-radius:8px;padding:9px 20px;font-family:'DM Sans',sans-serif;font-size:0.82rem;cursor:pointer;font-weight:500;transition:all 0.15s; }
      .fc-btn:hover { background:var(--ink);color:white;border-color:var(--ink); }
      .fc-btn:disabled { opacity:0.3;cursor:default; }
      .fc-dots { display:flex;gap:5px;align-items:center; }
      .fc-dot { width:7px;height:7px;border-radius:50%;background:var(--border); }
      .fc-dot.active { background:var(--ink); }
    </style>

    <div class="fc-hint">👆 Click the card to reveal the answer</div>

    <div class="flashcard-scene" id="flashcard-scene" onclick="flipCard()">
      <div class="flashcard-inner">
        <div class="flashcard-face flashcard-front">
          <div>
            <div class="label">Question ${currentCardIndex + 1}</div>
            <div class="question" id="fc-question">${s.cards[currentCardIndex].q}</div>
          </div>
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="answer" id="fc-answer">${s.cards[currentCardIndex].a}</div>
        </div>
      </div>
    </div>

    <div class="fc-nav">
      <button class="fc-btn" id="fc-prev" onclick="prevCard()" ${currentCardIndex === 0 ? 'disabled' : ''}>← Prev</button>
      <div class="fc-dots" id="fc-dots"></div>
      <button class="fc-btn" id="fc-next" onclick="nextCard()" ${currentCardIndex === s.cards.length - 1 ? 'disabled' : ''}>Next →</button>
    </div>
  `;
  renderDots();
}

function renderDots() {
  const s = activeSubject;
  const dots = document.getElementById('fc-dots');
  if (!dots) return;
  dots.innerHTML = s.cards.map((_, i) =>
    `<div class="fc-dot ${i === currentCardIndex ? 'active' : ''}"></div>`
  ).join('');
}

function flipCard() {
  cardFlipped = !cardFlipped;
  const scene = document.getElementById('flashcard-scene');
  if (scene) scene.classList.toggle('flipped', cardFlipped);
}

function nextCard() {
  if (currentCardIndex < activeSubject.cards.length - 1) {
    currentCardIndex++;
    cardFlipped = false;
    updateCard();
  }
}

function prevCard() {
  if (currentCardIndex > 0) {
    currentCardIndex--;
    cardFlipped = false;
    updateCard();
  }
}

function updateCard() {
  const s = activeSubject;
  const scene = document.getElementById('flashcard-scene');
  const q = document.getElementById('fc-question');
  const a = document.getElementById('fc-answer');
  const counter = document.getElementById('card-counter');
  const prev = document.getElementById('fc-prev');
  const next = document.getElementById('fc-next');
  if (!scene || !q) return;
  scene.classList.remove('flipped');
  setTimeout(() => {
    q.textContent = s.cards[currentCardIndex].q;
    a.textContent = s.cards[currentCardIndex].a;
    if (counter) counter.textContent = `${currentCardIndex + 1} / ${s.cards.length}`;
    if (prev) prev.disabled = currentCardIndex === 0;
    if (next) next.disabled = currentCardIndex === s.cards.length - 1;
    renderDots();
  }, 260);
}

function backToSubjects() {
  document.getElementById('revision-home').style.display = 'block';
  document.getElementById('revision-detail').style.display = 'none';
}

  'Music':            { bg: '#fdf5e8', color: '#7a4e00', border: '#f5d498' },
  'History':          { bg: '#fdf0e3', color: '#8a4a00', border: '#f5c88a' },
  'Chemistry':        { bg: '#e5f0fa', color: '#1c4a8a', border: '#a9c8ef' },
  'Physics':          { bg: '#e8f7ff', color: '#0e5c8a', border: '#90d2f0' },
  'Art & Design':     { bg: '#f5e8ff', color: '#6a1e9e', border: '#d4a8f5' },
};

function parseExamDate(dateStr) {
  const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const parts = dateStr.trim().split(' ');
  const day = parseInt(parts[1]);
  const mon = months[parts[2]];
  return new Date(2026, mon, day);
}

let examTableRendered = false;

function renderExamTable() {
  if (examTableRendered) return;
  examTableRendered = true;

  const container = document.getElementById('examtable-container');
  const today = new Date(); today.setHours(0,0,0,0);

  const written = examTimetable.filter(e => !e.coursework);
  const upcoming = written.filter(e => parseExamDate(e.date) >= today).length;
  const done = written.filter(e => parseExamDate(e.date) < today).length;
  const nextExam = written.find(e => parseExamDate(e.date) >= today);
  const daysToNext = nextExam ? Math.round((parseExamDate(nextExam.date) - today) / 86400000) : null;
  const nextLabel = nextExam ? nextExam.subject + ' – ' + nextExam.paper.split('(')[0].trim() : '';

  let summaryHTML = '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;">';
  summaryHTML += '<div style="background:white;border:1.5px solid var(--border);border-radius:10px;padding:14px 20px;flex:1;min-width:120px;"><div style="font-family:\'DM Serif Display\',serif;font-size:1.8rem;line-height:1;color:var(--ink);">' + upcoming + '</div><div style="font-size:0.72rem;color:var(--ink-light);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px;">Exams ahead</div></div>';
  summaryHTML += '<div style="background:white;border:1.5px solid var(--border);border-radius:10px;padding:14px 20px;flex:1;min-width:120px;"><div style="font-family:\'DM Serif Display\',serif;font-size:1.8rem;line-height:1;color:var(--green);">' + done + '</div><div style="font-size:0.72rem;color:var(--ink-light);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px;">Completed</div></div>';
  if (daysToNext !== null) {
    const dLabel = daysToNext === 0 ? 'Today!' : daysToNext + ' days';
    summaryHTML += '<div style="background:var(--ink);border:1.5px solid var(--ink);border-radius:10px;padding:14px 20px;flex:2;min-width:200px;"><div style="font-family:\'DM Serif Display\',serif;font-size:1.8rem;line-height:1;color:var(--highlight);">' + dLabel + '</div><div style="font-size:0.72rem;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px;">Next: ' + nextLabel + '</div></div>';
  }
  summaryHTML += '</div>';

  let tableHTML = '<div style="background:white;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;overflow-x:auto;">';
  tableHTML += '<table style="width:100%;border-collapse:collapse;font-size:0.82rem;min-width:600px;">';
  tableHTML += '<thead><tr style="background:var(--ink);color:white;">';
  ['Date','Time','Subject','Examination','Board','Duration'].forEach(h => {
    tableHTML += '<th style="padding:12px 14px;text-align:left;font-weight:600;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;">' + h + '</th>';
  });
  tableHTML += '</tr></thead><tbody>';

  let lastDate = '';
  examTimetable.forEach(function(e, i) {
    const c = etColors[e.subject] || { bg: '#f5f5f5', color: '#444', border: '#ddd' };
    const examDate = parseExamDate(e.date);
    const isPast = examDate < today;
    const isToday = examDate.getTime() === today.getTime();
    const isNewDate = e.date !== lastDate;
    lastDate = e.date;

    const rowBg = isToday ? 'var(--highlight-soft)' : (i % 2 === 0 ? 'white' : '#fafaf8');
    const opacity = isPast ? '0.4' : '1';

    const timeCell = e.coursework
      ? '<span style="font-size:0.7rem;background:#f0f0f0;padding:2px 7px;border-radius:4px;color:#666;">Coursework</span>'
      : e.time;

    const dateCell = isNewDate ? (e.date + ' 2026') : '';
    const dateWeight = isNewDate ? '600' : '400';
    const dateColor = isNewDate ? 'var(--ink)' : 'transparent';

    tableHTML += '<tr style="border-bottom:1px solid var(--border);opacity:' + opacity + ';background:' + rowBg + ';">';
    tableHTML += '<td style="padding:10px 14px;font-weight:' + dateWeight + ';color:' + dateColor + ';white-space:nowrap;">' + dateCell + '</td>';
    tableHTML += '<td style="padding:10px 14px;white-space:nowrap;">' + timeCell + '</td>';
    tableHTML += '<td style="padding:10px 14px;"><span style="background:' + c.bg + ';color:' + c.color + ';border:1px solid ' + c.border + ';padding:3px 9px;border-radius:5px;font-size:0.75rem;font-weight:500;white-space:nowrap;">' + e.subject + '</span></td>';
    tableHTML += '<td style="padding:10px 14px;color:var(--ink-light);font-size:0.78rem;">' + e.paper + '</td>';
    tableHTML += '<td style="padding:10px 14px;font-size:0.75rem;color:var(--ink-light);">' + e.board + '</td>';
    tableHTML += '<td style="padding:10px 14px;font-size:0.78rem;">' + (e.coursework ? '—' : (e.duration || '—')) + '</td>';
    tableHTML += '</tr>';
  });

  tableHTML += '</tbody></table></div>';
  tableHTML += '<p style="font-size:0.72rem;color:var(--ink-light);margin-top:12px;">* TBC times indicate coursework/portfolio submissions — confirm exact dates with school. Times marked TBC may change.</p>';

  container.innerHTML = summaryHTML + tableHTML;
}


// ─── INIT ────────────────────────────────────────────────────────────────────

renderTimetable();
renderExams();
updateProgress();
</script>
</body>
</html>
